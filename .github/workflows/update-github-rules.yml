name: Update GitHub Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub.yaml
        run: bash scripts/update_github_rules.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet GitHub.yaml GitHub.list; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GitHub.yaml GitHub.list
          git commit -m "chore: update GitHub domain rules"
          git push
